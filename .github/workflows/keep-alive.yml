name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # 14분마다 — Render 무료 플랜 슬립 방지 (15분 타임아웃 이전)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render API
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://marketflow-api-fzez.onrender.com/api/health 2>/dev/null || echo "000")
          echo "Render health: HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "Warning: Render API not responding (HTTP $CODE)"
          fi
