name: Deploy Frontend to Cloudflare Workers

on:
  # 자동 배포 비활성화 — 로컬 wrangler deploy로 통일
  # push:
  #   branches: [main]
  #   paths:
  #     - 'frontend-react/**'
  #     - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:  # 수동 트리거만 허용

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_API_BASE_URL은 frontend-react/.env.production에서 관리

      - name: Deploy to Cloudflare Workers (marketflow-dashboard)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          workingDirectory: frontend-react
