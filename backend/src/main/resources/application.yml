server:
  port: 8080

spring:
  application:
    name: marketflow-api
  jackson:
    default-property-inclusion: always
  datasource:
    url: jdbc:h2:file:${app.data.base-dir}/data/marketflow;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  data:
    base-dir: ${APP_BASE_DIR:C:/bitman_marketfloww}
    us-output-dir: ${app.data.base-dir}/us_market/output
    kr-data-dir: ${app.data.base-dir}/data
    service-dir: ${SERVICE_DIR:C:/bitman_service}
  cache:
    ttl-seconds: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4000,http://localhost:3000,http://localhost:5173}
  flask:
    base-url: ${FLASK_BASE_URL:http://localhost:5001}
  jwt:
    secret: ${JWT_SECRET:mf-dev-secret-2026-change-in-prod-must-be-256-bits}
    expiry-days: 30

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:marketflow}
    username: ${DB_USER:marketflow}
    password: ${DB_PASSWORD:marketflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
